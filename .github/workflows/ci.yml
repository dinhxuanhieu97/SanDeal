name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Unit + Integration + E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cài dependencies
        run: npm ci

      - name: Unit + Integration + Rate-limit test
        run: npm test

      - name: Cài trình duyệt cho Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E + Accessibility (axe-core)
        run: npm run test:e2e

  lighthouse:
    name: Lighthouse (SEO / Performance / A11y)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cài dependencies
        run: npm ci

      - name: Chạy Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
